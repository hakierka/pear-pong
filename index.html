<!DOCTYPE html>
<html>
<head>
  <title>P2P Battle-Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #00ff95;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #status {
    margin-bottom: 20px; 
    padding: 10px 20px; 
    border: 1px solid #00ff95;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 10px #00ff95;
    }
    #score {
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 8px;
    }
    canvas { 
    border: 4px solid #00ff95; 
    background: #000; 
    box-shadow: 0 0 20px rgba(0, 255, 149, 0.2); 
    }
    #controls {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
    #leaderboard {
      margin-top: 16px;
      font-size: 13px;
      color: #aaa;
      min-width: 300px;
      text-align: center;
    }
    #leaderboard table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
    }
    #leaderboard th, #leaderboard td {
      padding: 4px 12px;
      text-align: center;
    }
    #leaderboard th {
      color: #4caf50;
      border-bottom: 1px solid #333;
    }
    #leaderboard tr:nth-child(even) {
      background: #111;
    }
  </style>
</head>
<body>
  <div id="status">👀 Looking for an opponent...</div>
  <div id="score">0 : 0</div>
  <canvas id="game" width="800" height="400"></canvas>
  <div id="controls">Waiting for opponent...</div>
  <div id="leaderboard"><em>No matches yet</em></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
